<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chips Landing Page</title>

    <!-- CSS Link -->
    <link rel="stylesheet" href="style6.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">SunMall</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Chips</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>

        <div class="search-box">
            <input type="text" placeholder="Search chips...">
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">

        <!-- Left Content -->
        <div class="hero-text">

            <span class="tag">100% REAL INGREDIENTS</span>

            <h1>
                EAT OUR GRILLED <br>
                POTATO CHIPS
            </h1>

            <p>
                Satisfying savory potato chips with crispy and tasty flavour.
            </p>

            <div class="buttons">
                <button class="cart-btn">ADD TO CART</button>

                <div class="counter">
                    <span>-</span>
                    <span>2</span>
                    <span>+</span>
                </div>
            </div>

            <!-- Features -->
            <div class="features">

                <div class="feature">
                    <div class="circle green"></div>
                    <span>100% Natural</span>
                </div>

                <div class="feature">
                    <div class="circle yellow"></div>
                    <span>Oven Grilled</span>
                </div>

                <div class="feature">
                    <div class="circle red"></div>
                    <span>Tasty & Crunchy</span>
                </div>

            </div>

        </div>

        <div class="hero-image">

            <img src="pato1.jpg" alt="chips">

            <div class="label yellow-box">CRISPY &</div>
            <div class="label red-box">TASTY</div>

        </div>

    </section>

    <section class="products">

        <div class="card">
            <img src="pato3.jpg">
            <h3>Black Barbecue</h3>
            <p>$12.30</p>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="pato4.jpg">
            <h3>Mr. Potato</h3>
            <p>$15.89</p>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="pato5.jpg">
            <h3>Tom Yomm</h3>
            <p>$11.50</p>
            <button>Order Now</button>
        </div>

    </section>

</body>
</html>
